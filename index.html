<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Escape or Die - Online Lobby</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="lobby-menu">
        <h1>ESCAPE OR DIE</h1>
        <div class="developer-credit">Developed by Deniz Akpınar</div>
        
        <div class="lobby-box">
            <h3>Profil Ayarları:</h3>
            <input type="text" id="username-input" placeholder="Adını Yaz..." value="Deniz">
            <div id="profile-stats">Seviye: <span id="menu-level">1</span> | TP: <span id="menu-xp">0</span></div>
            
            <div style="margin-top: 12px;">
                <label style="font-size: 0.9rem; color: #00ffcc;">Karakter Rengini Seç:</label>
                <input type="color" id="color-picker" value="#00ffcc" oninput="updateMyColor(this.value)">
            </div>
        </div>

        <button id="btn-start-solo" class="btn" style="margin-bottom: 10px; background-color: #00ffcc; color: #000;">Tek Başına Başla</button>
        
        <div class="lobby-box">
            <h3>Uzaktan Arkadaşınla Oyna:</h3>
            <p style="font-size: 0.8rem; color: #a1a1aa;">Bağlantı Kodun (Arkadaşına At):</p>
            <div id="my-peer-id" style="font-weight: bold; color: #ff007f; font-size: 1.2rem; margin-bottom: 10px;">Kod Oluşturuluyor...</div>
            
            <input type="text" id="friend-peer-input" placeholder="Arkadaşının Kodunu Gir">
            <button id="btn-connect-online" class="btn" style="background-color: #ff007f; color: #fff; margin-top: 8px;">Arkadaşına Bağlan</button>
        </div>
    </div>

    <div id="pre-game-lobby" class="hidden">
        <h2 style="color: #00ffcc;">OYUN LOBİSİ</h2>
        <div class="lobby-players-container">
            <div class="player-slot">
                <canvas id="preview-p1" width="100" height="100"></canvas>
                <div id="lobby-n1">Sen</div>
                <div class="host-badge">Lobi Sahibi</div>
            </div>
            <div class="player-slot">
                <canvas id="preview-p2" width="100" height="100"></canvas>
                <div id="lobby-n2">Bekleniyor...</div>
            </div>
        </div>
        <div id="lobby-status" style="margin: 20px 0; color: #a1a1aa;">Arkadaşının hazır olması bekleniyor...</div>
        <button id="btn-lobby-start" class="btn hidden" style="background-color: #22c55e; color: white; width: 250px;">MAÇI BAŞLAT</button>
        <button id="btn-lobby-exit" class="btn" style="background-color: #444; color: white; width: 200px; margin-top: 10px;">Menüye Dön</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="game-ui">
            <div class="level-container">
                <div>P1: <span id="ui-username">Deniz</span></div>
                <div class="level-bar-label">Lvl: <span id="ui-level">1</span></div>
                <div class="level-bar-bg"><div id="ui-tp-bar" class="level-bar-fill"></div></div>
            </div>
            <div id="connection-status" style="color: #ff007f; font-weight: bold;">Online</div>
            <button id="btn-game-exit">Menüye Dön</button>
            <div class="info-container">
                <div>Wave: <span id="ui-wave">1</span></div>
                <div>Efekt: <span id="ui-effect">Yok</span></div>
            </div>
        </div>
        <div id="canvas-wrapper"><canvas id="gameCanvas" width="1200" height="800"></canvas></div>
        <div id="mobile-controls"><div id="joystick-left" class="joystick-zone"><div id="stick-left" class="joystick-stick"></div></div></div>
    </div>

    <div id="game-over-screen" class="hidden">
        <h2 id="game-over-title">OYUN BİTTİ</h2>
        <div id="xp-gain-text" style="color: #ffd700; margin-bottom: 15px;"></div>
        <button id="btn-next-game" class="btn" style="background-color: #00ffcc; color: #000;">Tekrar Oyna</button>
        <button id="btn-go-menu-over" class="btn" style="margin-top: 10px; background-color: #ff007f; color: white;">Ana Menüye Dön</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
